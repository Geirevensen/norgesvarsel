<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Norgeskart med vær</title>
<style>
  body {
    margin: 0;
    background: #f4f6f8;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .wrap { height: 100vh; display: grid; place-items: center; }
  svg#stage { height: 100vh; width: auto; display: block; }

  /* UI (litt mer mot midten) */
  .ui {
    position: fixed;
    top: 12px;
    left: 110px;          /* <-- justert fra 12px */
    transform: none;
    background: rgba(255,255,255,0.92);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    display: flex;
    gap: 6px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  .ui button {
    border: 0;
    padding: 10px 12px;
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    font-weight: 700;
    color: #5f6368;
  }
  .ui button.active {
    background: #fff;
    color: #1a73e8;
    box-shadow: 0 2px 8px rgba(0,0,0,0.14);
  }

  .status {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-size: 12px;
    color: #6b7280;
    background: rgba(255,255,255,0.85);
    padding: 6px 10px;
    border-radius: 999px;
    z-index: 10;
  }

  .version {
    position: fixed;
    bottom: 12px;
    right: 12px;
    font-size: 12px;
    color: #6b7280;
    background: rgba(255,255,255,0.85);
    padding: 6px 10px;
    border-radius: 999px;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="ui">
  <button id="btn3" class="active" type="button">Neste 3 dager</button>
  <button id="btnW" type="button">Helgen</button>
</div>

<div class="wrap">
  <svg id="stage" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" aria-label="Norgeskart">
    <image href="norgeskart.svg" x="0" y="0" width="1000" height="1000"></image>
    <g id="markers"></g>
  </svg>
</div>

<div class="status" id="status">Henter værdata …</div>
<div class="version">v2.06</div>

<script>
  const iconBase = "https://raw.githubusercontent.com/metno/weathericons/refs/heads/main/weather/svg/";

  const places = [
    { key: "lillehammer",  name: "Lillehammer",            lat: 61.11,     lon: 10.46,     anchor: { x: 289, y: 768 } },
    { key: "kristiansand", name: "Kristiansand",           lat: 58.14671,  lon: 7.9956,    anchor: { x: 198, y: 938 } },

    { key: "bohuslan",     name: "Bohuslän (Lysekil)",      lat: 58.275573, lon: 11.435558, anchor: { x: 320, y: 920 } },
    { key: "romsdalen",    name: "Romsdalen (Åndalsnes)",   lat: 62.567446, lon: 7.68722,   anchor: { x: 180, y: 680 } },
    { key: "bergen",       name: "Bergen",                 lat: 60.388847, lon: 5.323993,  anchor: { x: 120, y: 815 } },
    { key: "trondelag",    name: "Trøndelag (Flatanger)",   lat: 64.483396, lon: 10.771859, anchor: { x: 285, y: 565 } },
    { key: "jotunheimen",  name: "Jotunheimen (Turtagrø)",  lat: 61.50441,  lon: 7.80167,   anchor: { x: 200, y: 735 } },
    { key: "lofoten",      name: "Lofoten (Henningsvær)",   lat: 68.154187, lon: 14.207253, anchor: { x: 450, y: 215 } },
    { key: "hemsedal",     name: "Hemsedal",               lat: 60.863072, lon: 8.552333,  anchor: { x: 210, y: 785 } }
  ];

  // Tripler på kartet
  let iconSize = 34;
  let iconSpacing = 38;

  const clickRadius = Math.max(26, Math.round(iconSize * 0.85));

  const panel = { x: 450, y: 400, w: 320, h: 410, r: 14, pad: 16, rowH: 44, icon: 26 };

  const stage = document.getElementById("stage");
  const markers = document.getElementById("markers");
  const statusEl = document.getElementById("status");
  const btn3 = document.getElementById("btn3");
  const btnW = document.getElementById("btnW");

  const placeDayPoints = new Map();
  let currentMode = "3days";

  let panelVisible = false;
  let selectedPlaceKey = null;

  // Fade-state
  let panelAnimating = false;
  let panelCurrentOpacity = 0;

  btn3.addEventListener("click", () => updateView("3days"));
  btnW.addEventListener("click", () => updateView("weekend"));

  stage.addEventListener("click", (evt) => {
    const pt = clientToSvgPoint(evt.clientX, evt.clientY, stage);

    let best = null;
    let bestDist = Infinity;

    for (const p of places) {
      const dx = pt.x - p.anchor.x;
      const dy = pt.y - p.anchor.y;
      const dist = Math.hypot(dx, dy);
      if (dist < bestDist) {
        bestDist = dist;
        best = p;
      }
    }

    if (best && bestDist <= clickRadius) {
      if (selectedPlaceKey === best.key) {
        // toggle samme sted
        panelVisible = !panelVisible;
        if (panelVisible) fadePanelIn(best.key);
        else fadePanelOutAndRemove();
      } else {
        // bytt sted og vis panel
        selectedPlaceKey = best.key;
        panelVisible = true;

        // hvis panelet er oppe: fade ut → bytt innhold → fade inn
        if (document.getElementById("forecastPanel")) {
          fadePanelOutIn(best.key);
        } else {
          fadePanelIn(best.key);
        }
      }
      return;
    }

    // Klikk utenfor: lukk panel
    if (panelVisible) {
      panelVisible = false;
      fadePanelOutAndRemove();
    }
  });

  function setActive(mode) {
    btn3.classList.toggle("active", mode === "3days");
    btnW.classList.toggle("active", mode === "weekend");
  }

  async function fetchWeatherForAllPlaces() {
    statusEl.textContent = "Henter værdata …";
    try {
      await Promise.all(
        places.map(async (p) => {
          const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${p.lat}&lon=${p.lon}`;
          const res = await fetchWithTimeout(url, 12000);
          if (!res.ok) throw new Error(`${p.name}: HTTP ${res.status} ${res.statusText}`);
          const json = await res.json();
          placeDayPoints.set(p.key, groupDataByDay(json.properties.timeseries));
        })
      );

      statusEl.textContent = "Vær lastet. Klikk på et sted i kartet.";
      updateView(currentMode);
    } catch (e) {
      console.error(e);
      statusEl.textContent = `Kunne ikke hente værdata: ${e.message || e}`;
    }
  }

  function updateView(mode) {
    const modeChanged = (mode !== currentMode);
    currentMode = mode;
    setActive(mode);

    markers.innerHTML = "";

    const startOfToday = new Date();
    startOfToday.setHours(0,0,0,0);

    for (const p of places) {
      const dayPoints = placeDayPoints.get(p.key);
      if (!dayPoints || !dayPoints.length) continue;

      const picked = pickThree(dayPoints, mode, startOfToday);
      if (!picked.length) continue;

      const xs = [p.anchor.x - iconSpacing, p.anchor.x, p.anchor.x + iconSpacing];

      picked.forEach((dp, i) => {
        const symbol =
          dp.data?.next_12_hours?.summary?.symbol_code ||
          dp.data?.next_1_hours?.summary?.symbol_code ||
          "clearsky_day";

        const g = svgEl("g");
        g.setAttribute("transform", `translate(${xs[i]} ${p.anchor.y})`);

        const img = svgEl("image");
        img.setAttribute("href", `${iconBase}${symbol}.svg`);
        img.setAttribute("x", String(-iconSize / 2));
        img.setAttribute("y", String(-iconSize / 2));
        img.setAttribute("width", String(iconSize));
        img.setAttribute("height", String(iconSize));

        g.appendChild(img);
        markers.appendChild(g);
      });
    }

    // Hvis panel er synlig og mode endret: fade ut → inn med oppdatert innhold
    if (panelVisible && selectedPlaceKey) {
      if (modeChanged) fadePanelOutIn(selectedPlaceKey);
      else render7DayPanel(selectedPlaceKey, /*keepOpacity*/ true);
    }

    statusEl.textContent = (mode === "3days")
      ? "Viser neste 3 dager (klikk på et sted for 7 dager)."
      : "Viser fredag–søndag (klikk på et sted for 7 dager).";
  }

  function pickThree(dayPoints, mode, startOfToday) {
    const picked = [];

    for (const dp of dayPoints) {
      const d = new Date(dp.time);
      if (d.getTime() < startOfToday.getTime()) continue;

      const dow = d.getDay(); // 0=søn ... 5=fre 6=lør
      const ok = (mode === "3days") ? true : (dow === 5 || dow === 6 || dow === 0);

      if (ok) {
        picked.push(dp);
        if (picked.length === 3) break;
      }
    }

    if (picked.length < 3) {
      for (const dp of dayPoints) {
        if (picked.includes(dp)) continue;
        const d = new Date(dp.time);
        if (d.getTime() < startOfToday.getTime()) continue;
        picked.push(dp);
        if (picked.length === 3) break;
      }
    }

    return picked.slice(0, 3);
  }

  function groupDataByDay(timeseries) {
    const groups = {};
    for (const item of timeseries) {
      const d = new Date(item.time);
      const key = d.toLocaleDateString("en-CA"); // YYYY-MM-DD
      (groups[key] ||= []).push(item);
    }

    return Object.keys(groups).sort().map(key => {
      const points = groups[key];
      let best = points[0];
      let bestDiff = 999;

      for (const p of points) {
        const hour = new Date(p.time).getHours();
        const diff = Math.abs(hour - 12);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = p;
        }
      }
      return best;
    });
  }

  // -------- panelrender + fade --------

  function render7DayPanel(placeKey, keepOpacity = false) {
    const prevOpacity = keepOpacity ? panelCurrentOpacity : 1;

    remove7DayPanel();

    const p = places.find(x => x.key === placeKey);
    const dayPoints = placeDayPoints.get(placeKey);
    if (!p || !dayPoints || !dayPoints.length) return;

    const startOfToday = new Date();
    startOfToday.setHours(0,0,0,0);

    const picked7 = [];
    for (const dp of dayPoints) {
      const d = new Date(dp.time);
      if (d.getTime() < startOfToday.getTime()) continue;
      picked7.push(dp);
      if (picked7.length === 7) break;
    }

    const g = svgEl("g");
    g.setAttribute("id", "forecastPanel");
    g.setAttribute("opacity", String(prevOpacity));

    const rect = svgEl("rect");
    rect.setAttribute("x", panel.x);
    rect.setAttribute("y", panel.y);
    rect.setAttribute("width", panel.w);
    rect.setAttribute("height", panel.h);
    rect.setAttribute("rx", panel.r);
    rect.setAttribute("ry", panel.r);
    rect.setAttribute("fill", "rgba(255,255,255,0.92)");
    rect.setAttribute("stroke", "rgba(17,24,39,0.15)");
    rect.setAttribute("stroke-width", "1");
    g.appendChild(rect);

    const title = svgEl("text");
    title.setAttribute("x", panel.x + panel.pad);
    title.setAttribute("y", panel.y + panel.pad + 6);
    title.setAttribute("font-size", "18");
    title.setAttribute("font-weight", "700");
    title.setAttribute("fill", "#111827");
    title.setAttribute("dominant-baseline", "hanging");
    title.textContent = p.name;
    g.appendChild(title);

    const sep = svgEl("line");
    sep.setAttribute("x1", panel.x + panel.pad);
    sep.setAttribute("x2", panel.x + panel.w - panel.pad);
    sep.setAttribute("y1", panel.y + panel.pad + 34);
    sep.setAttribute("y2", panel.y + panel.pad + 34);
    sep.setAttribute("stroke", "rgba(17,24,39,0.12)");
    sep.setAttribute("stroke-width", "1");
    g.appendChild(sep);

    const startY = panel.y + panel.pad + 48;

    picked7.forEach((dp, i) => {
      const t = new Date(dp.time);
      const symbol =
        dp.data?.next_12_hours?.summary?.symbol_code ||
        dp.data?.next_1_hours?.summary?.symbol_code ||
        "clearsky_day";

      const rowY = startY + i * panel.rowH;

      const dateTxt = svgEl("text");
      dateTxt.setAttribute("x", panel.x + panel.pad);
      dateTxt.setAttribute("y", rowY);
      dateTxt.setAttribute("font-size", "14");
      dateTxt.setAttribute("fill", "#111827");
      dateTxt.setAttribute("dominant-baseline", "middle");
      const weekday = t.toLocaleDateString("no-NO", { weekday: "short" }).replace(".", "");
      const date = t.toLocaleDateString("no-NO", { day: "2-digit", month: "2-digit" });
      dateTxt.textContent = `${weekday} ${date}`;
      g.appendChild(dateTxt);

      const img = svgEl("image");
      img.setAttribute("href", `${iconBase}${symbol}.svg`);
      img.setAttribute("width", panel.icon);
      img.setAttribute("height", panel.icon);
      img.setAttribute("x", panel.x + panel.w - panel.pad - panel.icon);
      img.setAttribute("y", rowY - panel.icon / 2);
      g.appendChild(img);

      if (i < picked7.length - 1) {
        const line = svgEl("line");
        line.setAttribute("x1", panel.x + panel.pad);
        line.setAttribute("x2", panel.x + panel.w - panel.pad);
        line.setAttribute("y1", rowY + panel.rowH / 2);
        line.setAttribute("y2", rowY + panel.rowH / 2);
        line.setAttribute("stroke", "rgba(17,24,39,0.08)");
        line.setAttribute("stroke-width", "1");
        g.appendChild(line);
      }
    });

    stage.appendChild(g);
  }

  function remove7DayPanel() {
    const old = document.getElementById("forecastPanel");
    if (old) old.remove();
  }

  function setPanelOpacity(value) {
    panelCurrentOpacity = value;
    const g = document.getElementById("forecastPanel");
    if (g) g.setAttribute("opacity", String(value));
  }

  function animateOpacity(from, to, durationMs, onDone) {
    if (panelAnimating) return; // unngå overlappende animasjoner
    panelAnimating = true;

    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / durationMs);
      const eased = t * (2 - t); // enkel ease-out
      const val = from + (to - from) * eased;
      setPanelOpacity(val);

      if (t < 1) requestAnimationFrame(tick);
      else {
        panelAnimating = false;
        if (onDone) onDone();
      }
    };
    setPanelOpacity(from);
    requestAnimationFrame(tick);
  }

  function fadePanelIn(placeKey) {
    render7DayPanel(placeKey);
    setPanelOpacity(0);
    animateOpacity(0, 1, 180);
  }

  function fadePanelOutAndRemove() {
    const g = document.getElementById("forecastPanel");
    if (!g) return;
    const startOpacity = panelCurrentOpacity || 1;

    animateOpacity(startOpacity, 0, 140, () => {
      remove7DayPanel();
      panelCurrentOpacity = 0;
    });
  }

  function fadePanelOutIn(placeKey) {
    const g = document.getElementById("forecastPanel");
    if (!g) {
      fadePanelIn(placeKey);
      return;
    }
    const startOpacity = panelCurrentOpacity || 1;

    animateOpacity(startOpacity, 0, 120, () => {
      render7DayPanel(placeKey);
      setPanelOpacity(0);
      animateOpacity(0, 1, 180);
    });
  }

  // -------- utils --------

  function svgEl(name) {
    return document.createElementNS("http://www.w3.org/2000/svg", name);
  }

  function clientToSvgPoint(clientX, clientY, svg) {
    const p = svg.createSVGPoint();
    p.x = clientX;
    p.y = clientY;

    const ctm = svg.getScreenCTM();
    if (!ctm) return { x: 0, y: 0 };

    const sp = p.matrixTransform(ctm.inverse());
    return { x: sp.x, y: sp.y };
  }

  async function fetchWithTimeout(url, ms) {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), ms);
    try {
      return await fetch(url, { signal: controller.signal });
    } finally {
      clearTimeout(t);
    }
  }

  fetchWeatherForAllPlaces();
</script>

</body>
</html>
